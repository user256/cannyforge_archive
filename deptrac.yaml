deptrac:
  paths:
    - ./src
  layers:
    # The seam: interfaces the engine and the composition root share. Depends
    # on nothing internal.
    - name: Contracts
      collectors:
        - type: directory
          value: src/Contracts/.*

    # The archive engine: sitemap/archive generation and the pagination
    # replacement. May use Contracts; never reaches back up into Bootstrap.
    - name: Core
      collectors:
        - type: directory
          value: src/Core/.*

    # External-service integrations and secure stores. May depend on Contracts
    # and, when needed, Core utilities; Core must not know about it.
    - name: Integration
      collectors:
        - type: directory
          value: src/Integration/.*

    # WordPress-admin surface: settings page, form rendering and parsing. Reads
    # and writes the settings via Contracts + Core; never the other way round.
    - name: Admin
      collectors:
        - type: directory
          value: src/Admin/.*

    # WordPress front-end surface: the archive page endpoint and its rendering.
    # Pulls settings + entries via Contracts + Core; never reaches Bootstrap.
    - name: Frontend
      collectors:
        - type: directory
          value: src/Frontend/.*

    # Composition root — the only layer allowed to wire everything together
    # against WordPress hooks.
    - name: Bootstrap
      collectors:
        - type: directory
          value: src/Bootstrap/.*

  ruleset:
    # Contracts are the dependency sink: they depend on nothing internal.
    Contracts: ~

    # Core is the heart: it knows only the contracts. It must NOT know about
    # Admin or Bootstrap — the dependency arrow points one way.
    Core:
      - Contracts

    # Integrations sit beside Core, never underneath it.
    Integration:
      - Contracts
      - Core

    # Admin builds the settings UI on the contracts (settings types) and the
    # engine (the repository). It never reaches into Bootstrap.
    Admin:
      - Contracts
      - Core
      - Integration

    # Frontend exposes the archive page, building on the contracts and engine.
    # It never reaches into Admin or Bootstrap.
    Frontend:
      - Contracts
      - Core

    # Bootstrap is the composition root: it may see everything to wire it.
    Bootstrap:
      - Contracts
      - Core
      - Integration
      - Admin
      - Frontend
