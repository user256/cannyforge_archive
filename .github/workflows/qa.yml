name: QA

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static-analysis:
    name: Static analysis (pinned PHP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: sodium, mbstring
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # Each gate runs as its own step so CI shows exactly which one failed.
      # These gates are pinned to one PHP version (8.1) rather than matrixed —
      # they check code style/types/architecture once, not runtime behaviour
      # per-interpreter (ticket 607).
      - name: PHPCS / WPCS
        run: composer cs

      - name: PHPStan (level 9 + dead-code + WP stubs)
        run: composer stan

      - name: Rector (dead-code dry-run)
        run: composer rector

      - name: PHParkitect (architecture rules)
        run: composer arch

      - name: Deptrac (layer dependency rules)
        run: composer deptrac

      - name: PHPMD (god-class budget — hard-fails on complexity/length/size)
        run: composer mess

  test:
    name: PHPUnit (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Requires PHP 8.1 (readme.txt) through the latest stable at the time
        # of writing, 8.4 — ticket 607. Coverage/mutation testing only runs
        # once, on the pinned version below, to keep CI time reasonable.
        php-version: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: sodium, mbstring
          tools: composer:v2
          # pcov so Infection (mutation testing) can generate coverage in CI.
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPUnit
        run: composer test

      # Report-only for now: prints the real MSI but does not fail the build
      # until we've seen the first measured number and set a threshold (ticket
      # 201). Flip `continue-on-error` to false once minMsi is set. Only runs
      # on the pinned PHP version — mutation testing is expensive and the
      # result shouldn't vary meaningfully across PHP versions.
      - name: Infection (mutation testing — report only)
        if: matrix.php-version == '8.1'
        continue-on-error: true
        run: composer infection

  js-tests:
    name: Admin JS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Jest (assets/js/admin.js)
        run: npm test
